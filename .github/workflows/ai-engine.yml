name: AI Engine CI

on:
  push:
    paths:
      - "packages/ai-engine/**"
      - ".github/workflows/ai-engine.yml"
  pull_request:
    paths:
      - "packages/ai-engine/**"
      - ".github/workflows/ai-engine.yml"

jobs:
  test:
    name: Test AI Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package in editable mode
        run: pip install -e "packages/ai-engine/[dev]"

      - name: Lint (ruff)
        run: ruff check packages/ai-engine/

      - name: Type check (mypy)
        run: mypy packages/ai-engine/iterra_ai/

      - name: Run tests
        run: |
          cd packages/ai-engine
          pytest tests/ -v --cov=iterra_ai --cov-report=term-missing
